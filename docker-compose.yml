services:
  nextcloud_db:
    image: mariadb:10.11
    container_name: nextcloud_mysql_container
    restart: always
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=mi_clave_secreta_root
      - MYSQL_PASSWORD=mi_clave_secreta_db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  nextcloud_app:
    image: nextcloud:latest
    container_name: nextcloud_web_container
    restart: always
    ports:
      - "8080:80"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      - nextcloud_db
    volumes:
      - app_data:/var/www/html
    environment:
      - MYSQL_PASSWORD=mi_clave_secreta_db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=nextcloud_db

volumes:
  db_data:
  app_data: